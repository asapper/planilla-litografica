spring.application.name=planilla-backend

# Server port — private range to avoid conflicts with common dev services
server.port=49301

# Faster startup: delay bean creation until first use
spring.main.lazy-initialization=true

# PostgreSQL — remote DB, used only for stored procedure execution
postgres.datasource.url=jdbc:postgresql://192.168.0.20:5432/sunhive
postgres.datasource.username=procesoplanilla
postgres.datasource.password=planilla17
postgres.datasource.driver-class-name=org.postgresql.Driver
postgres.datasource.hikari.maximum-pool-size=5
postgres.datasource.hikari.minimum-idle=1
postgres.datasource.hikari.connection-timeout=10000
postgres.datasource.hikari.idle-timeout=300000

# H2 — local file DB, used for duplicate detection log
h2.datasource.url=jdbc:h2:file:${user.home}/.planilla/data/planilla-log;AUTO_SERVER=TRUE
h2.datasource.username=sa
h2.datasource.password=
h2.datasource.driver-class-name=org.h2.Driver

# Async job processing
job.max-retries=3

# File upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Logging — written to file for auditability
logging.file.name=logs/planilla.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n
logging.level.com.planilla=INFO
logging.level.org.springframework.web=WARN
