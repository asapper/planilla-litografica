# Dev-only overrides — active only with --spring.profiles.active=dev

# Demo mode — skips both the PostgreSQL SP call and the H2 log write; prevents demo runs from blocking real submissions
demo.mode=true

# CORS — add the Vite dev server origins on top of the production Tauri origins
cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,tauri://localhost,http://tauri.localhost,https://tauri.localhost
